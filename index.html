<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard pessoal para gerenciar projetos e ferramentas">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
    <title>Personal Workspace | Dashboard</title>
</head>
<body>

    <!-- Header Principal -->
    <header id="main-header">
        <h1>Meu Dashboard</h1>
        <div class="search-bar">
            <input type="text" placeholder="Buscar projetos..." aria-label="Buscar projetos">
        </div>
    </header>

    <main>
        <!-- Sidebar de Navegação -->
        <aside id="side-bar">
            <!-- Menu de Links -->
            <nav class="menu-links" aria-label="Menu principal">
                <a href="#home" title="Ir para Home">Home</a>
                <a href="#perfil" title="Acessar Perfil">Perfil</a>
                <a href="#config" title="Configurações">Config</a>
            </nav> 
 
            <!-- Seção de Perfil do Usuário -->
            <section class="user-profile">
                <img src="img/e9b5d3db99cd89c36f7db3a81ccbded8.webp" alt="Avatar do usuário" id="user-avatar">
                <span class="user-name">Cheguei</span>
            </section>
        </aside>

        <!-- Seção de Conteúdo Principal -->
        <section id="content">
            <h2>Meus Projetos</h2>
            <ul role="list">
                <li><a href="#projeto-1" title="Acessar Projeto 1">Projeto 1</a></li>
                <li><a href="#clima" title="Aplicação de Clima">Clima</a></li>
                <li><a href="#tasks" title="Gerenciador de Tasks">Tasks</a></li>
                <li><a href="#whatsapp" title="Integração WhatsApp">WhatsApp</a></li>
            </ul>
        </section>
    </main>

</body>
</html>
