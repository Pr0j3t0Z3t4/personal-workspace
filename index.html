<!DOCTYPE html>
<html lang="pt-br">

            <nav class="menu-links">
                <a href="#home">Home</a>

                <a href="#config">Configurações</a>
            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <section id="content">
            <h2>Projetos</h2>
            <ul>
                <li><a href="#">Projeto 1</a></li>
                <li><a href="#">Clima</a></li>
                <li><a href="#">Tasks</a></li>

    </main>

</html>
